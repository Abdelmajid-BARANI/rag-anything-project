model_name: "rag_anything_docling_v5"
description: "RAG-Anything multimodal (LightRAG + Docling + Ollama, optimisé FR)"

# ─── Ollama ───────────────────────────────────────────────────────────────────
ollama:
  host: "http://localhost:11434"
  llm_model:    "mistral-nemo:12b"    # Meilleur LLM français, anti-hallucination
  extract_model: "qwen2.5:7b"         # Extraction entités (rapide + structuré)
  vision_model: null                   # Vision désactivée (données texte/tableaux uniquement)
  embed_model:  "nomic-embed-text"     # 768 dimensions, bon multilingue
  embed_dim:    768
  num_ctx_llm:  16384                  # Fenêtre LLM réponses (mistral-nemo supporte 128K)
  num_ctx_extract: 4096               # Fenêtre extraction (qwen2.5:7b — rapide sur T4)

# ─── Parser (MinerU) ──────────────────────────────────────────────────────────
parser:
  backend:      "docling"   # docling (meilleur pour tableaux FR) | mineru | paddleocr
  parse_method: "auto"       # auto (multimodal) | txt (rapide, texte seul) | ocr
  device:       "cuda"       # cuda | cpu | cuda:0
  lang:         "fr"         # Langue principale pour l'OCR
  formula:      true         # Parser les formules mathematiques
  table:        true         # Parser les tableaux

# ─── Chemins ──────────────────────────────────────────────────────────────────
paths:
  data_dir:    "./donnees_rag"             # Documents source
  output_dir:  "./output"                  # Resultats MinerU (images extraites...)
  working_dir: "./data/rag_anything_storage"  # Knowledge Graph LightRAG

# ─── Ingestion ────────────────────────────────────────────────────────────────
ingestion:
  file_extensions: [".pdf"]  # Extensions a traiter (.pdf, .docx, .pptx...)
  recursive:   false         # Chercher dans les sous-dossiers
  max_workers: 1             # Workers paralleles (1 recommande avec Ollama local)

# ─── Requetes ─────────────────────────────────────────────────────────────────
query:
  default_mode: "hybrid"     # naive | local | global | hybrid (recommande)
  vlm_enhanced: null         # null=auto | true=force | false=desactive
  top_k: 25                  # voisins graphe
  chunk_top_k: 15            # chunks vectoriels
  max_total_tokens: 12000    # budget contexte

# ─── API ──────────────────────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  file:  "./logs/rag_anything.log"

